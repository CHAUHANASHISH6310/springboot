apiVersion: autoscaling/v2

kind: HorizontalPodAutoscaler

metadata:
  name: shranvi-hpa
  namespace: shranvi

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shranvi-api

  minReplicas: 2
  maxReplicas: 5

  metrics:
  - type: Resource

    resource:
      name: cpu

      target:
        type: Utilization
        averageUtilization: 70