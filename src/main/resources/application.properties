# ============================================
# Shranvi Spring Boot API - Application Config
# ============================================

# Server Port - Using 8081 to avoid conflict with Flask on 5000 or 8080
server.port=8081
server.servlet.context-path=/

# ============================================
# MySQL Database Configuration
# IMPORTANT: Replace <YOUR_SERVER_IP> with your actual EC2 server IP
# ============================================
spring.datasource.url=jdbc:mysql://13.206.232.75:3306/Shranvi6310?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=Shranvi6310
spring.datasource.password=//Shranvi6310//
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Settings (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================
# JPA / Hibernate Settings
# ============================================
spring.jpa.hibernate.ddl-auto=update
# Use 'update' during first run if tables don't exist, then change to 'validate'
# Options: none, validate, update, create, create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# Jackson JSON Settings
# ============================================
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.default-property-inclusion=NON_NULL

# ============================================
# Actuator (Health Check for CI/CD)
# ============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true

# ============================================
# Logging
# ============================================
logging.level.com.shranvi=INFO
logging.level.org.hibernate.SQL=WARN
logging.file.name=/var/log/shranvi-api/application.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================
# App Info
# ============================================
spring.application.name=shranvi-products-api
info.app.name=Shranvi Products API
info.app.version=1.0.0
info.app.description=REST API for Shranvi product catalog
